<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', sans-serif; background: #e2e8f0;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    background: radial-gradient(ellipse at top, #f1f5f9 0%, #cbd5e1 100%);
  }
  input, select, button, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

function MobileApp() {
  const [screen, setScreen] = useState(localStorage.getItem('so_m_screen') || 'products');
  const [toasts, setToasts] = useState([]);
  const toastRef = useRef(0);

  const onNav = (id) => { setScreen(id); localStorage.setItem('so_m_screen', id); };
  const onToast = (type, message) => {
    const id = ++toastRef.current;
    setToasts(t => [...t, { id, type, message }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  };

  const screens = {
    products:  <MProductsScreen  onToast={onToast}/>,
    analytics: <MAnalyticsScreen/>,
    finance:   <MFinanceScreen/>,
    orders:    <MOrdersScreen/>,
    more:      <MMoreScreen onNav={onNav} onToast={onToast}/>,
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'40px 20px' }}>
      <IOSDevice width={402} height={874}>
        {/* Custom layout — skip IOSDevice's built-in title nav */}
        <div style={{ height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>
          {/* Status bar spacer */}
          <div style={{ height:62, flexShrink:0 }}/>
          {/* Scrollable content */}
          <div style={{ flex:1, overflowY:'auto', overflowX:'hidden', paddingBottom:90 }}>
            {screens[screen]}
          </div>
          {/* Bottom tab bar (fixed) */}
          <MTabBar active={screen} onNav={onNav}/>
        </div>
      </IOSDevice>

      {/* Toasts (outside device) */}
      <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', display:'flex', flexDirection:'column', gap:8, zIndex:2000 }}>
        {toasts.map(t => (
          <div key={t.id} style={{
            background:'#0f172a', color:'#fff', borderRadius:12, padding:'10px 16px',
            boxShadow:'0 10px 40px rgba(0,0,0,0.25)', display:'flex', alignItems:'center', gap:10,
            fontFamily:'Inter', fontSize:13, animation:'slideIn 0.2s ease',
          }}>
            <Icon name={t.type==='success'?'Check':t.type==='error'?'AlertCircle':'Zap'} size={15} color={t.type==='success'?'#10b981':t.type==='error'?'#ef4444':'#3b82f6'}/>
            {t.message}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp/>);
</script>
